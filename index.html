<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Agenda AR">
<title>Agenda Deportiva AR</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #000;
  --bg: #0a0a0a;
  --card: #111;
  --card2: #161616;
  --border: #222;
  --border2: #2a2a2a;
  --text: #fff;
  --muted: #555;
  --muted2: #333;
  --lime: #c8f000;
  --lime-dark: #a0c200;
  --orange: #ff4d00;
  --red: #e02020;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 16px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ─────────────────────────────────────── */
.app-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(0,0,0,.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 0;
}

.hdr-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 32px; height: 32px;
  background: var(--lime);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.brand-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.5rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}

.brand-name span { color: var(--lime); }

.hdr-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.date-pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
}

.btn-refresh {
  width: 32px; height: 32px;
  background: var(--lime);
  border: none; border-radius: 4px;
  color: #000;
  font-size: 16px; font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
  flex-shrink: 0;
}
.btn-refresh:active { opacity: .8; }
.btn-refresh:disabled { opacity: .4; }

/* ── SPORT TABS ──────────────────────────────────── */
.sport-tabs {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  margin: 0 -16px;
  padding: 0 16px;
}
.sport-tabs::-webkit-scrollbar { display: none; }

.tab {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 14px 8px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  flex-shrink: 0;
  transition: color .15s, border-color .15s;
}
.tab:hover { color: #888; }
.tab.active {
  color: var(--lime);
  border-bottom-color: var(--lime);
}

/* ── CONTENT ─────────────────────────────────────── */
.content {
  padding: 16px 16px calc(var(--safe-bot) + 16px);
}

/* ── LIVE SECTION ───────────────────────────────── */
.live-section {
  border: 1px solid rgba(224,32,32,.3);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}

.live-header {
  background: var(--red);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.live-dot-anim {
  width: 7px; height: 7px;
  background: #fff;
  border-radius: 50%;
  animation: blink 1s infinite;
  flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.live-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  flex: 1;
}

.live-count {
  background: rgba(0,0,0,.3);
  border-radius: 3px;
  padding: 2px 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  color: #fff;
  letter-spacing: 1px;
}

.live-section .event-card {
  border: none;
  border-radius: 0;
  border-bottom: 1px solid var(--border);
}
.live-section .event-card:last-child { border-bottom: none; }
.live-section .event-card::before { display: none; }

/* ── UPCOMING HEADER ─────────────────────────────── */
.upcoming-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  margin-top: 4px;
}

.upcoming-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.upcoming-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── EVENT CARD ──────────────────────────────────── */
.event-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
  animation: slideUp .3s ease both;
  transition: border-color .15s;
}
.event-card:last-child { margin-bottom: 0; }
.event-card:active { border-color: var(--border2); }

/* left accent */
.event-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.event-card[data-s="futbol"]::before { background: var(--lime); }
.event-card[data-s="basket"]::before { background: var(--orange); }
.event-card[data-s="f1"]::before     { background: var(--red); }
.event-card[data-s="tennis"]::before { background: #a259ff; }
.event-card[data-s="boxeo"]::before  { background: #f0a500; }

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.sport-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
}
.event-card[data-s="futbol"] .sport-badge { background: rgba(200,240,0,.12); color: var(--lime); }
.event-card[data-s="basket"] .sport-badge { background: rgba(255,77,0,.12);   color: var(--orange); }
.event-card[data-s="f1"]     .sport-badge { background: rgba(224,32,32,.12);  color: #ff6b6b; }
.event-card[data-s="tennis"] .sport-badge { background: rgba(162,89,255,.12); color: #bf8bff; }
.event-card[data-s="boxeo"]  .sport-badge { background: rgba(240,165,0,.12);   color: #f0a500; }

.time-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--red);
  border-radius: 3px;
  padding: 3px 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
}
.live-badge-dot {
  width: 5px; height: 5px;
  background: #fff;
  border-radius: 50%;
  animation: blink 1s infinite;
}

.ev-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: .5px;
  text-transform: uppercase;
  line-height: 1.15;
  margin-bottom: 3px;
  padding-left: 6px;
  color: var(--text);
}

.ev-sub {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 12px;
  padding-left: 6px;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.channels { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }

.ch {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: .8px;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 3px;
  background: var(--card2);
  border: 1px solid var(--border2);
  color: #aaa;
}

.venue {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--muted);
  flex-shrink: 0;
}

/* ── STATS BAR ───────────────────────────────────── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--black);
}

.stat {
  text-align: center;
}

.stat-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 1px;
  color: var(--text);
  line-height: 1;
}

.stat-num.lime { color: var(--lime); }
.stat-num.orange { color: var(--orange); }
.stat-num.red { color: var(--red); }

.stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

/* ── STATUS SCREENS ──────────────────────────────── */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  text-align: center;
}

.load-bar-wrap {
  width: 120px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 20px;
}
.load-bar {
  height: 100%;
  background: var(--lime);
  border-radius: 2px;
  animation: loadbar 1.5s ease-in-out infinite;
}
@keyframes loadbar {
  0%   { width: 0%;   margin-left: 0; }
  50%  { width: 70%;  margin-left: 0; }
  100% { width: 0%;   margin-left: 100%; }
}

.load-txt {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.load-txt b { color: var(--lime); }

.error-screen {
  margin: 0;
  padding: 32px 20px;
  border: 1px solid rgba(224,32,32,.25);
  border-radius: 8px;
  text-align: center;
}

.err-icon {
  font-size: 28px;
  margin-bottom: 10px;
}

.err-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #ff6b6b;
  margin-bottom: 8px;
}

.err-msg {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.5;
}

.btn-retry {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 20px;
  background: var(--red);
  border: none;
  border-radius: 4px;
  color: #fff;
  cursor: pointer;
}

.empty-screen {
  padding: 60px 24px;
  text-align: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── UPD indicator ───────────────────────────────── */
.upd-row {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 5px 16px;
  background: rgba(200,240,0,.04);
  border-bottom: 1px solid rgba(200,240,0,.1);
}
.upd-dot { width:5px;height:5px;background:var(--lime);border-radius:50%; }
.upd-txt {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lime);
}

/* ── FOOTER ──────────────────────────────────────── */
.app-footer {
  text-align: center;
  padding: 16px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

.footer-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.footer-badge span {
  color: var(--lime);
}

@keyframes slideUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
@keyframes spin    { to{transform:rotate(360deg)} }

.event-card:nth-child(1){animation-delay:.03s}
.event-card:nth-child(2){animation-delay:.06s}
.event-card:nth-child(3){animation-delay:.09s}
.event-card:nth-child(4){animation-delay:.12s}
.event-card:nth-child(5){animation-delay:.15s}
.event-card:nth-child(6){animation-delay:.18s}
.event-card:nth-child(7){animation-delay:.21s}
.event-card:nth-child(8){animation-delay:.24s}
</style>
</head>
<body>

<div class="app-header">
  <div class="hdr-top">
    <div class="brand">
      <div class="brand-icon">🏟️</div>
      <div class="brand-name">AGENDA <span>AR</span></div>
    </div>
    <div class="hdr-right">
      <div class="date-pill" id="dateLabel">—</div>
      <button class="btn-refresh" id="btnRefresh" onclick="loadAgenda()" title="Actualizar">↻</button>
    </div>
  </div>

  <div class="sport-tabs">
    <div class="tab active" data-s="todos"  onclick="setFilter('todos')">TODOS</div>
    <div class="tab"        data-s="futbol" onclick="setFilter('futbol')">⚽ FÚTBOL</div>
    <div class="tab"        data-s="basket" onclick="setFilter('basket')">🏀 BÁSQUET</div>
    <div class="tab"        data-s="f1"     onclick="setFilter('f1')">🏎️ F1</div>
    <div class="tab"        data-s="tennis" onclick="setFilter('tennis')">🎾 TENIS</div>
    <div class="tab"        data-s="boxeo"  onclick="setFilter('boxeo')">🥊 BOXEO</div>
  </div>
</div>

<div class="upd-row" id="updRow">
  <span class="upd-dot"></span>
  <span class="upd-txt">Actualizado <span id="updTime"></span></span>
</div>

<div id="statsBar" class="stats-bar" style="display:none">
  <div class="stat">
    <div class="stat-num lime" id="statTotal">0</div>
    <div class="stat-label">Eventos</div>
  </div>
  <div class="stat">
    <div class="stat-num red" id="statLive">0</div>
    <div class="stat-label">En vivo</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="statFut">0</div>
    <div class="stat-label">Fútbol</div>
  </div>
  <div class="stat">
    <div class="stat-num orange" id="statOther">0</div>
    <div class="stat-label">Otros</div>
  </div>
</div>

<div class="content" id="content">
</div>

<div class="app-footer">
  <div class="footer-badge">POWERED BY <span>AI</span> · GMT-3 · AUTO 30MIN</div>
</div>

<script>
const WORKER_URL = 'https://gemini-proxy.juncalcf.workers.dev';
const SPORT_META = {
  futbol: { icon:'⚽', label:'Fútbol' },
  basket: { icon:'🏀', label:'Básquet' },
  f1:     { icon:'🏎️', label:'Fórmula 1' },
  tennis: { icon:'🎾', label:'Tenis' },
  boxeo:  { icon:'🥊', label:'Boxeo' },
};
let allEvents = [];
let currentFilter = 'todos';

window.addEventListener('DOMContentLoaded', () => { updateDate(); loadAgenda(); setInterval(loadAgenda, 30*60*1000); });

function updateDate() {
  const s = new Date().toLocaleDateString('es-AR', { weekday:'short', day:'numeric', month:'short', timeZone:'America/Argentina/Buenos_Aires' });
  document.getElementById('dateLabel').textContent = s.toUpperCase();
}

function getArgNow() {
  const now = new Date();
  const TZ = 'America/Argentina/Buenos_Aires';
  const p = {};
  new Intl.DateTimeFormat('es-AR', { timeZone:TZ, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).formatToParts(now).forEach(x => p[x.type] = x.value);
  return {
    iso:     p.year + '-' + p.month + '-' + p.day,
    dayName: new Intl.DateTimeFormat('es-AR', { timeZone:TZ, weekday:'long' }).format(now),
    day:     p.day,
    month:   new Intl.DateTimeFormat('es-AR', { timeZone:TZ, month:'long' }).format(now),
    year:    p.year,
    time:    p.hour + ':' + p.minute
  };
}

async function callAI(prompt) {
  const r = await fetch(WORKER_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ prompt })
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || 'Error ' + r.status); }
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
  return d.choices?.[0]?.message?.content || '';
}

async function loadAgenda() {
  const btn = document.getElementById('btnRefresh');
  btn.style.animation = 'spin 1s linear infinite';
  btn.disabled = true;
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('updRow').style.display = 'none';

  const { iso, dayName, day, month, year, time: nowArg } = getArgNow();

  document.getElementById('content').innerHTML =
    '<div class="loading-screen">' +
      '<div class="load-bar-wrap"><div class="load-bar"></div></div>' +
      '<div class="load-txt">CARGANDO AGENDA <span id="streamDots">.</span></div>' +
    '</div>';

  let dots = 1;
  const dotTimer = setInterval(() => {
    const el = document.getElementById('streamDots');
    if (el) { dots = dots >= 3 ? 1 : dots+1; el.textContent = '.'.repeat(dots); }
  }, 400);

  const prompt =
    'Fecha: ' + iso + ' (' + dayName + ' ' + day + ' ' + month + ' ' + year + '). Hora Argentina: ' + nowArg + '.' +
    ' Agenda deportiva de HOY ' + iso + ' para Argentina.' +
    ' Responde SOLO JSON array, sin texto extra, sin backticks.' +
    ' Formato: [{"sport":"futbol","title":"Equipo A vs Equipo B","subtitle":"Competicion","time":"21:00","isLive":false,"channels":["ESPN"],"venue":"Estadio"}]' +
    ' sport debe ser: futbol, basket, f1, tennis o boxeo.' +
    ' isLive=true si el evento esta en curso ahora a las ' + nowArg + '.' +
    ' Incluye: futbol (Liga Profesional Argentina, Libertadores, Champions, Premier, LaLiga, NBA, F1 si hay hoy, ATP/WTA si hay hoy, peleas de boxeo si hay hoy).' +
    ' TV argentina: ESPN, ESPN Premium, Star+, DSports, TyC Sports, Canal 7, TNT Sports, DIRECTV Sports.' +
    ' Solo eventos de HOY ' + iso + '. Entre 8 y 14 eventos reales.';

  try {
    const raw = await callAI(prompt);
    clearInterval(dotTimer);

    // Robust JSON extraction
    let jsonStr = raw.replace(/```json|```/g, '').trim();
    const start = jsonStr.indexOf('[');
    const end = jsonStr.lastIndexOf(']');
    if (start === -1 || end === -1) throw new Error('Respuesta inválida de la IA. Reintentá en unos segundos.');
    jsonStr = jsonStr.slice(start, end + 1);

    allEvents = JSON.parse(jsonStr);
    if (!Array.isArray(allEvents) || !allEvents.length) throw new Error('No se encontraron eventos para hoy ' + iso + '.');

    document.getElementById('updTime').textContent = nowArg;
    document.getElementById('updRow').style.display = 'flex';
    updateStats();
    setFilter(currentFilter);
  } catch(err) {
    clearInterval(dotTimer);
    document.getElementById('content').innerHTML =
      '<div class="error-screen"><div class="err-icon">⚡</div>' +
      '<div class="err-title">Error al cargar</div>' +
      '<div class="err-msg">' + err.message + '</div>' +
      '<button class="btn-retry" onclick="loadAgenda()">REINTENTAR</button></div>';
  } finally {
    btn.style.animation = '';
    btn.textContent = '\u21bb';
    btn.disabled = false;
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent = allEvents.length;
  document.getElementById('statLive').textContent = allEvents.filter(e=>e.isLive).length;
  document.getElementById('statFut').textContent = allEvents.filter(e=>e.sport==='futbol').length;
  document.getElementById('statOther').textContent = allEvents.filter(e=>e.sport!=='futbol').length;
  document.getElementById('statsBar').style.display = 'grid';
}

function sortByTime(evs) {
  return [...evs].sort((a,b) => {
    const m = t => { if(!t||t==='—') return 9999; const [h,min]=t.split(':').map(Number); return h*60+min; };
    return m(a.time)-m(b.time);
  });
}

function setFilter(sport) {
  currentFilter = sport;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-s="' + sport + '"]').classList.add('active');
  renderEvents(sport === 'todos' ? allEvents : allEvents.filter(e => e.sport === sport));
}

function renderEvents(evs) {
  const el = document.getElementById('content');
  if (!evs.length) { el.innerHTML = '<div class="empty-screen">SIN EVENTOS HOY</div>'; return; }
  const live = evs.filter(e=>e.isLive);
  const upcoming = sortByTime(evs.filter(e=>!e.isLive));
  let html = '';
  if (live.length) {
    html += '<div class="live-section"><div class="live-header"><span class="live-dot-anim"></span>' +
      '<span class="live-label">EN VIVO AHORA</span><span class="live-count">'+live.length+' EVENTOS</span></div>' +
      live.map(cardHTML).join('') + '</div>';
  }
  if (upcoming.length) {
    if (live.length) html += '<div class="upcoming-header"><span class="upcoming-label">PRÓXIMOS</span><span class="upcoming-line"></span></div>';
    html += upcoming.map(cardHTML).join('');
  }
  el.innerHTML = html;
}

function cardHTML(ev) {
  const chs = Array.isArray(ev.channels) ? ev.channels : [];
  const meta = SPORT_META[ev.sport] || { icon:'🏅', label: ev.sport };
  const accentColor = {futbol:'var(--lime)',basket:'var(--orange)',f1:'var(--red)',tennis:'#a259ff',boxeo:'#f0a500'}[ev.sport] || '#fff';
  return '<div class="event-card" data-s="' + ev.sport + '">' +
    '<div class="card-top">' +
      '<span class="sport-badge">' + meta.icon + ' ' + meta.label.toUpperCase() + '</span>' +
      (ev.isLive
        ? '<span class="live-badge"><span class="live-badge-dot"></span>LIVE</span>'
        : '<span class="time-tag">' + (ev.time||'--') + ' HS</span>') +
    '</div>' +
    '<div class="ev-title">' + ev.title + '</div>' +
    '<div class="ev-sub">' + (ev.subtitle||'') + '</div>' +
    '<div class="card-footer"><div class="channels">' +
      (chs.length
        ? chs.map(c=>'<span class="ch">'+c+'</span>').join('')
        : '<span class="ch" style="color:var(--muted2)">SIN TV CONFIRMADA</span>') +
    '</div>' + (ev.venue ? '<span class="venue">'+ev.venue+'</span>' : '') + '</div></div>';
}
</script>
